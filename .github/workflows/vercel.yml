name: Vercel Production Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Auto-deploy configuration:
# This workflow automatically deploys to Vercel when:
# 1. Changes are pushed to main branch -> Production deployment
# 2. Pull requests are created -> Preview deployment
#
# Required GitHub Secrets to enable auto-deploy:
# - VERCEL_TOKEN: Your Vercel access token
# - VERCEL_ORG_ID: Your Vercel organization ID
# - VERCEL_PROJECT_ID: Your Vercel project ID
#
# To set these secrets:
# 1. Go to https://github.com/OumaCavin/mcp-weather-server/settings/secrets/actions
# 2. Click "New repository secret"
# 3. Add each secret with its value

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-preview:
    name: Deploy Preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true

      - name: Deploy to Vercel (Preview)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} 2>&1 || echo "DEPLOY_FAILED")
          if [ "$url" = "DEPLOY_FAILED" ]; then
            echo "Preview deployment requires VERCEL_TOKEN secret to be configured"
            echo "preview_url=https://vercel.com/new/clone?repository-url=${{ github.server_url }}/${{ github.repository }}&project-name=mcp-weather-server" >> $GITHUB_OUTPUT
          else
            echo "preview_url=$url" >> $GITHUB_OUTPUT
          fi

      - name: Comment on Pull Request
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Vercel Preview Deployment\n\n' +
                'Preview URL: ' + previewUrl + '\n\n' +
                'Note: To enable automated deployments, please configure the following secrets in your repository:\n' +
                '- `VERCEL_TOKEN` - Your Vercel access token\n' +
                '- `VERCEL_ORG_ID` - Your Vercel organization ID\n' +
                '- `VERCEL_PROJECT_ID` - Your Vercel project ID'
            });

  deploy-production:
    name: Deploy Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true

      - name: Deploy to Vercel (Production)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 || echo "DEPLOY_FAILED")
          if [ "$url" = "DEPLOY_FAILED" ]; then
            echo "Production deployment requires VERCEL_TOKEN secret to be configured"
            echo "production_url=https://vercel.com/new/clone?repository-url=${{ github.server_url }}/${{ github.repository }}&project-name=mcp-weather-server" >> $GITHUB_OUTPUT
          else
            echo "production_url=$url" >> $GITHUB_OUTPUT
          fi

      - name: Create Deployment Summary
        if: always()
        run: |
          echo "## Vercel Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ steps.deploy.outputs.production_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | ${{ github.workflow }} |" >> $GITHUB_STEP_SUMMARY
